<script>
const SUPABASE_URL = "https://botfmbszxqpnelyiccdi.supabase.co";

const SUPABASE_KEY = "sb_publishable_62Ut3sGstDGcPB0Io3k-dQ_iJaovqHd";

const supabaseClient = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

async function loadRealHistory() {

    const { data, error } = await supabaseClient
        .from("results")
        .select("*")
        .order("result_date", { ascending: false });

    if (error) {
        document.getElementById("realHistory").innerHTML =
            "Error Loading History";
        return;
    }

    const slotOrder = {
        "12PM": 1,
        "2PM": 2,
        "4PM": 3,
        "6PM": 4,
        "8PM": 5,
        "10PM": 6
    };

    data.sort((a, b) => {
        if (a.result_date !== b.result_date) {
            return new Date(b.result_date) - new Date(a.result_date);
        }
        return slotOrder[a.slot] - slotOrder[b.slot];
    });

    let html = "<h2>Latest Real Results</h2>";

    data.forEach(row => {
        html += `
        <p>
        ${row.result_date}
        →
        ${row.slot}
        →
        ${row.number}
        </p>`;
    });

    document.getElementById("realHistory").innerHTML = html;
}

loadRealHistory();
