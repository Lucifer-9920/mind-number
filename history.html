<link rel="stylesheet" href="style.css">

<body>
<script>

<p>01 Jun → 47 | 83 | 15 | 92 | 34 | 76</p>
<p>02 Jun → 24 | 66 | 41 | 88 | 53 | 19</p>
<p>03 Jun → 38 | 72 | 14 | 67 | 25 | 81</p>

"May 2026": `
<h2>May 2026</h2>
<p>01 May → 11 | 52 | 74 | 23 | 68 | 90</p>

    <option>May 2026</option>
    <option>April 2026</option>
    <option>March 2026</option>
    <option>February 2026</option>

<div class="card" id="historyData">

<h2>June 2026</h2>

<p>01 Jun → 47 | 83 | 15 | 92 | 34 | 76</p>
<p>02 Jun → 24 | 66 | 41 | 88 | 53 | 19</p>
